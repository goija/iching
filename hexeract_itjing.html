<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Tjing 6D-Hyperkubus (Hexeract)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
            padding: 10px;
        }
        h1 {
            font-size: 1.8em;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            color: #ffffff;
        }
        p {
            font-size: 0.9em;
            color: #888;
            margin: 0;
            font-style: italic;
        }
        #canvas-container {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            cursor: grab;
            width: 90vw;
            max-width: 900px;
            height: 70vh;
            min-height: 500px;
        }
        #canvas-container:active {
            cursor: grabbing;
        }
        .node text {
            font-size: 10px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: central;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>6D Hexeract Topologie</h1>
        <p>De 64 staten van de I Tjing, verbonden via 192 binaire Hamming-afstanden (XOR)</p>
    </div>

    <div id="canvas-container"></div>

    <script>
        // 1. Setup afmetingen gebaseerd op de container
        const container = document.getElementById('canvas-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        // 2. Genereer deterministisch de 64 nodes
        const nodes = Array.from({ length: 64 }, (_, i) => {
            const id = i + 1;
            const isNode22 = id === 22;
            return {
                id: id,
                label: id.toString(),
                radius: isNode22 ? 18 : 8,
                fill: isNode22 ? '#f39c12' : '#2980b9', // Goud voor 22, blauw voor rest
                stroke: isNode22 ? '#ffffff' : '#1f618d',
                strokeWidth: isNode22 ? 3 : 1,
                textColor: isNode22 ? '#000000' : '#ffffff'
            };
        });

        // 3. Genereer deterministisch de 192 verbindingen via Bitwise XOR
        const links = [];
        for (let i = 0; i < 64; i++) {
            for (let bit = 0; bit < 6; bit++) {
                let mask = 1 << bit;
                let neighbor = i ^ mask;
                
                // Alleen opslaan als start < eind om dubbele lijnen te voorkomen
                if (i < neighbor) {
                    links.push({
                        source: i + 1,
                        target: neighbor + 1
                    });
                }
            }
        }

        // 4. Setup D3.js SVG en Force Simulation
        const svg = d3.select("#canvas-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .call(d3.zoom().on("zoom", (event) => g.attr("transform", event.transform)))
            .append("g");

        const g = svg.append("g");

        // Fysica instellingen voor een mooie ruimtelijke spreiding
        const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(60).strength(0.5))
            .force("charge", d3.forceManyBody().strength(-150))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collide", d3.forceCollide().radius(d => d.radius + 5).iterations(2));

        // 5. Teken verbindingen
        const link = g.append("g")
            .selectAll("line")
            .data(links)
            .enter().append("line")
            .attr("stroke", "#444")
            .attr("stroke-opacity", 0.6)
            .attr("stroke-width", 1.5);

        // 6. Teken nodes
        const node = g.append("g")
            .selectAll("g")
            .data(nodes)
            .enter().append("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        node.append("circle")
            .attr("r", d => d.radius)
            .attr("fill", d => d.fill)
            .attr("stroke", d => d.stroke)
            .attr("stroke-width", d => d.strokeWidth);

        node.append("text")
            .text(d => d.label)
            .attr("fill", d => d.textColor);

        // 7. Update posities tijdens simulatie
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("transform", d => `translate(${d.x},${d.y})`);
        });

        // 8. Interactie-functies (Slepen)
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        // Zorg dat de SVG meeschaalt bij het verkleinen van het venster
        window.addEventListener('resize', () => {
            const newWidth = container.clientWidth;
            const newHeight = container.clientHeight;
            svg.attr("width", newWidth).attr("height", newHeight);
            simulation.force("center", d3.forceCenter(newWidth / 2, newHeight / 2));
            simulation.alpha(0.3).restart();
        });
    </script>
</body>
</html>
